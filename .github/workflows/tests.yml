name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      clickhouse:
        image: clickhouse/clickhouse-server:25.3
        env:
          TZ: UTC
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
          CLICKHOUSE_PASSWORD: ""
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 8123:8123

    env:
      TEST_TIMEDB_PG_DSN: postgresql://testuser:testpassword@localhost:5432/testdb
      TEST_TIMEDB_CH_URL: http://default:@localhost:8123/default

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -U testuser -d testdb; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
        env:
          PGPASSWORD: testpassword

      - name: Run tests with coverage
        run: pytest --cov=timedb --cov-report=xml

      - name: Install notebook dependencies
        run: pip install -e ".[test,notebooks]"

      - name: Run notebook tests
        run: pytest --nbmake examples/ --nbmake-timeout=120
        env:
          TIMEDB_PG_DSN: postgresql://testuser:testpassword@localhost:5432/testdb
          TIMEDB_CH_URL: http://default:@localhost:8123/default
          MPLBACKEND: Agg

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
