services:
  postgres:
    image: postgres:18
    container_name: local_postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devdb
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: local_clickhouse
    restart: always
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - ./chdata:/var/lib/clickhouse
